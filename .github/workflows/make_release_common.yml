name: make_release_common
env:
  ACTION_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
  SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
  SLACK_ICON: https://pbs.twimg.com/profile_images/1274014582265298945/OjBKP9kn_400x400.png
  SLACK_USERNAME: ${{ secrets.BOT_USERNAME }}
  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
  GARALT_SECRET: ${{ secrets.GARALT }}
permissions: {}
jobs:
  verify-triggering-actor:
    name: make_release_common/verify-triggering-actor
    if: startsWith(github.ref, 'refs/tags/')
    uses: ./.github/workflows/verify_triggering_actor.yml
    secrets:
      ALLOWED_TEAM: ${{ secrets.ALLOWED_TEAM }}
      READ_ORG_TOKEN: ${{ secrets.READ_ORG_TOKEN }}
  package:
    name: make_release_common/package
    runs-on: ubuntu-latest
    needs: verify-triggering-actor
    outputs:
      hash: ${{ steps.hash.outputs.hash }}
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
        persist-credentials: 'false'
        token: ${{ secrets.REPO_CHECKOUT_TOKEN }}
    - name: Prepare package
      env:
        PACKAGE: ${{ inputs.package-name }}
      run: |
        cargo package -p "${PACKAGE}"
    - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
      with:
        name: crate-${{ inputs.package-name }}
        path: target/package/*.crate
    - name: generate hash
      id: hash
      run: cd target/package && echo "hash=$(sha256sum ./*.crate | base64 -w0)" >> "${GITHUB_OUTPUT}"
  provenance:
    name: make_release_common/provenance
    if: ${{ !inputs.dry-run  }}
    needs: package
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    permissions:
      actions: read
      id-token: write
      contents: write
    with:
      base64-subjects: ${{ needs.package.outputs.hash }}
    secrets: inherit
  publish_release:
    name: make_release_common/publish-release
    needs: package
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
        persist-credentials: 'false'
        token: ${{ secrets.REPO_CHECKOUT_TOKEN }}
    - name: Download artifact
      uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
      with:
        name: crate-${{ inputs.package-name }}
        path: target/package
    - name: Authenticate on registry
      uses: rust-lang/crates-io-auth-action@b7e9a28eded4986ec6b1fa40eeee8f8f165559ec
      id: auth
    - name: Publish crate.io package
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        PACKAGE: ${{ inputs.package-name }}
        DRY_RUN: ${{ inputs.dry-run && '--dry-run' || '' }}
      run: |
        # DRY_RUN expansion cannot be double quoted when variable contains empty string otherwise cargo publish
        # would fail. This is safe since DRY_RUN is handled in the env section above.
        # shellcheck disable=SC2086
        cargo publish -p "${PACKAGE}" ${DRY_RUN}
    - name: Generate hash
      id: published_hash
      run: cd target/package && echo "pub_hash=$(sha256sum ./*.crate | base64 -w0)" >> "${GITHUB_OUTPUT}"
    - name: Slack notification (hashes comparison)
      if: ${{ needs.package.outputs.hash != steps.published_hash.outputs.pub_hash }}
      continue-on-error: true
      uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661
      env:
        SLACK_COLOR: failure
        SLACK_MESSAGE: 'SLSA ${{ inputs.package-name }} - hash comparison failure: (${{ env.ACTION_RUN_URL }})'
    - name: Slack Notification
      if: ${{ failure() }}
      continue-on-error: true
      uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661
      env:
        SLACK_COLOR: ${{ job.status }}
        SLACK_MESSAGE: '${{ inputs.package-name }} release finished with status: ${{ job.status }}. (${{ env.ACTION_RUN_URL }})'
on:
  workflow_call:
    inputs:
      package-name:
        type: string
        required: true
      dry-run:
        type: boolean
        default: true
    secrets:
      REPO_CHECKOUT_TOKEN:
        required: true
      SLACK_CHANNEL:
        required: true
      BOT_USERNAME:
        required: true
      SLACK_WEBHOOK:
        required: true
      ALLOWED_TEAM:
        required: true
      READ_ORG_TOKEN:
        required: true
